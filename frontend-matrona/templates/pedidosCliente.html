<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Pedidos - Matrona</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans flex h-screen">
    <!-- Barra Lateral -->
    {%include 'componentes/botonMovil.html'%}
    {%include 'componentes/sidebar.html'%}

    <div class="flex-1 flex flex-col overflow-hidden">
        <!-- Cabecera -->
        {% include 'componentes/header.html' %}

        <!-- Contenido Principal -->
        <main class="bg-orange-50 flex-1 overflow-auto p-6">
            <div class="max-w-4xl mx-auto">
                <!-- Estadísticas rápidas -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                    <div class="bg-white p-4 rounded-lg shadow border border-orange-100">
                        <div class="flex items-center">
                            <div class="p-3 rounded-full bg-orange-100 text-orange-500 mr-3">
                                <i class="fas fa-box-open"></i>
                            </div>
                            <div>
                                <p class="text-sm text-gray-500">Pedidos totales</p>
                                <p class="text-xl font-bold" id="total-pedidos">0</p>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow border border-green-100">
                        <div class="flex items-center">
                            <div class="p-3 rounded-full bg-green-100 text-green-500 mr-3">
                                <i class="fas fa-check-circle"></i>
                            </div>
                            <div>
                                <p class="text-sm text-gray-500">Reclamados</p>
                                <p class="text-xl font-bold" id="entregados">0</p>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow border border-red-100">
                        <div class="flex items-center">
                            <div class="p-3 rounded-full bg-red-100 text-red-500 mr-3">
                                <i class="fas fa-spinner"></i>
                            </div>
                            <div>
                                <p class="text-sm text-gray-500">En proceso</p>
                                <p class="text-xl font-bold" id="pendientes">0</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Listado de pedidos -->
                <div class="bg-white rounded-lg shadow overflow-hidden">
                    
                    
                    <!-- Pedido 1 -->
                    <div id="contenedor-principal-pedidos" class="p-4 border-b border-gray-200 hover:bg-orange-50 transition">
                        <div class="flex justify-between items-start">
                            <div>
                                <div class="flex items-center mb-1">
                                    <span class="font-bold text-orange-600 mr-2">ID-000123</span>
                                    <span class="px-3 py-1 rounded-full text-xs font-semibold bg-green-100 text-green-800 flex items-center">
                                        <i class="fas fa-check-circle mr-1"></i> Reclamado
                                    </span>
                                </div>
                                <p class="text-sm text-gray-500 mb-2">28/07/2025 - 10:45 AM</p>
                                
                                <div class="flex items-center text-sm text-gray-700 mb-1">
                                    <i class="fas fa-beer mr-2 text-orange-500"></i>
                                    <span>100 unidades - Matrona Durazno</span>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="text-lg font-bold text-orange-600">$400.000</p>
                            </div>
                        </div>
                    </div>
                    
                   
                    
                    <!-- Pedido 3 -->
                   
                </div>
            </div>
        </main>

        <!-- Pie de página -->
       {% include 'componentes/footer.html' %}
    </div>
<script src="/static/js/clientePedidos.js"></script>
<script src="/static/js/sidebar.js"></script>

</body>
</html>
